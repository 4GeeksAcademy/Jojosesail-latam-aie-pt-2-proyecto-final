<!doctype html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registro B2B | TrackFlow</title>
	<meta name="description" content="Formulario de registro para nuevas marcas B2B en TrackFlow: datos de empresa, producto y operacion logistica.">
	<meta name="robots" content="index, follow">
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<script defer src="validation.js"></script>
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100 antialiased">
	<div class="pointer-events-none absolute inset-0 -z-10 overflow-hidden" aria-hidden="true">
		<div class="absolute left-0 top-0 h-72 w-72 rounded-full bg-amber-400/15 blur-3xl"></div>
		<div class="absolute right-0 bottom-0 h-80 w-80 rounded-full bg-red-500/15 blur-3xl"></div>
		<div class="absolute left-1/2 top-1/2 h-72 w-72 -translate-x-1/2 rounded-full bg-blue-500/10 blur-3xl"></div>
	</div>

	<header class="border-b border-zinc-800/90 bg-zinc-950/95 backdrop-blur">
		<div class="mx-auto flex max-w-5xl flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8">
			<a href="index.html" class="text-sm font-semibold text-amber-300 transition hover:text-amber-200" data-i18n="backToSite"></a>
			<div class="flex items-center gap-2">
				<button type="button" data-lang-toggle="es" class="rounded-md border border-zinc-700 px-2.5 py-1 text-xs font-semibold text-zinc-200 transition hover:border-amber-400 hover:text-amber-300">ES</button>
				<button type="button" data-lang-toggle="en" class="rounded-md border border-zinc-700 px-2.5 py-1 text-xs font-semibold text-zinc-200 transition hover:border-amber-400 hover:text-amber-300">EN</button>
			</div>
		</div>
	</header>

	<main class="mx-auto max-w-5xl px-4 py-8 sm:px-6 sm:py-10 lg:px-8 lg:py-14">
		<section class="space-y-3" aria-labelledby="registro-title">
			<p class="inline-flex rounded-full border border-orange-400/50 bg-orange-500/10 px-4 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-orange-200" data-i18n="registrationTag"></p>
			<h1 id="registro-title" class="text-3xl font-bold text-white sm:text-4xl" data-i18n="registrationTitle"></h1>
			<p class="max-w-3xl text-zinc-300" data-i18n="registrationDesc"></p>
		</section>

		<form id="registrationForm" data-validate-form novalidate class="mt-8 rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4 sm:p-6 lg:p-8" aria-labelledby="form-title">
			<h2 id="form-title" class="text-xl font-semibold text-white" data-i18n="formTitle"></h2>

			<fieldset class="mt-6 rounded-xl border border-zinc-800 p-4 sm:p-5">
				<legend class="px-1 text-sm font-medium text-zinc-200" data-i18n="legendPersonalInfo"></legend>
				<div class="mt-3 grid gap-4 sm:grid-cols-2">
					<div>
						<label for="fullName" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelFullName"></label>
						<input id="fullName" name="fullName" type="text" required data-rule="name" aria-describedby="fullNameError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30" data-i18n-placeholder="placeholderFullName">
						<p id="fullNameError" class="mt-1 hidden text-sm text-rose-300"></p>
					</div>

					<div>
						<label for="phone" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelPhone"></label>
						<input id="phone" name="phone" type="tel" required data-rule="phone" aria-describedby="phoneError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30" data-i18n-placeholder="placeholderPhone">
						<p id="phoneError" class="mt-1 hidden text-sm text-rose-300"></p>
					</div>

					<div class="sm:col-span-2">
						<label for="email" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelEmail"></label>
						<input id="email" name="email" type="email" required data-rule="email" aria-describedby="emailError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30" data-i18n-placeholder="placeholderEmail">
						<p id="emailError" class="mt-1 hidden text-sm text-rose-300"></p>
					</div>
				</div>
			</fieldset>

			<fieldset class="mt-4 rounded-xl border border-zinc-800 p-4 sm:p-5">
				<legend class="px-1 text-sm font-medium text-zinc-200" data-i18n="legendBusinessInfo"></legend>
				<div class="mt-3 grid gap-4 sm:grid-cols-2">
					<div>
						<label for="brand" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelBrand"></label>
						<input id="brand" name="brand" type="text" required data-rule="brand" aria-describedby="brandError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30" data-i18n-placeholder="placeholderBrand">
						<p id="brandError" class="mt-1 hidden text-sm text-rose-300"></p>
					</div>

					<div>
						<label for="sector" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelSector"></label>
						<select id="sector" name="sector" required data-rule="select" aria-describedby="sectorError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30">
							<option value="" data-i18n="optionSectorDefault"></option>
							<option value="fashion" data-i18n="optionSectorFashion"></option>
							<option value="beauty" data-i18n="optionSectorBeauty"></option>
							<option value="electronics" data-i18n="optionSectorElectronics"></option>
							<option value="food" data-i18n="optionSectorFood"></option>
							<option value="other" data-i18n="optionSectorOther"></option>
						</select>
						<p id="sectorError" class="mt-1 hidden text-sm text-rose-300"></p>
					</div>

					<div class="sm:col-span-2">
						<label for="productType" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelProductType"></label>
						<input id="productType" name="productType" type="text" required data-rule="text" aria-describedby="productTypeError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30" data-i18n-placeholder="placeholderProductType">
						<p id="productTypeError" class="mt-1 hidden text-sm text-rose-300"></p>
					</div>
				</div>
			</fieldset>

			<fieldset class="mt-4 rounded-xl border border-zinc-800 p-4 sm:p-5">
				<legend class="px-1 text-sm font-medium text-zinc-200" data-i18n="legendLogisticsInfo"></legend>
				<div class="mt-3 grid gap-4 sm:grid-cols-2">
					<div>
						<label for="averageWeight" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelAverageWeight"></label>
						<input id="averageWeight" name="averageWeight" type="number" min="0.1" step="0.1" required data-rule="weight" aria-describedby="averageWeightError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30" data-i18n-placeholder="placeholderAverageWeight">
						<p id="averageWeightError" class="mt-1 hidden text-sm text-rose-300"></p>
					</div>

					<div>
						<label for="salesVolume" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelSalesVolume"></label>
						<select id="salesVolume" name="salesVolume" required data-rule="select" aria-describedby="salesVolumeError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30">
							<option value="" data-i18n="optionSalesDefault"></option>
							<option value="0-10k" data-i18n="optionSales1"></option>
							<option value="10k-50k" data-i18n="optionSales2"></option>
							<option value="50k-200k" data-i18n="optionSales3"></option>
							<option value="200k+" data-i18n="optionSales4"></option>
						</select>
						<p id="salesVolumeError" class="mt-1 hidden text-sm text-rose-300"></p>
					</div>

					<div>
						<label for="monthlyOrders" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelMonthlyOrders"></label>
						<input id="monthlyOrders" name="monthlyOrders" type="number" min="1" step="1" required data-rule="orders" aria-describedby="monthlyOrdersError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30" data-i18n-placeholder="placeholderMonthlyOrders">
						<p id="monthlyOrdersError" class="mt-1 hidden text-sm text-rose-300"></p>
					</div>

					<fieldset class="rounded-xl border border-zinc-800 p-4 sm:col-span-2" aria-describedby="locationError">
						<legend class="px-1 text-sm font-medium text-zinc-200" data-i18n="legendLocation"></legend>
						<div class="mt-3 flex flex-col gap-3 sm:flex-row sm:flex-wrap sm:gap-4">
							<label class="inline-flex items-center gap-2 text-sm text-zinc-300">
								<input type="radio" name="location" value="los-angeles" required data-rule="radio" class="h-4 w-4 border-zinc-600 bg-zinc-900 text-amber-400 focus:ring-amber-300/40">
								<span data-i18n="locationLA"></span>
							</label>
							<label class="inline-flex items-center gap-2 text-sm text-zinc-300">
								<input type="radio" name="location" value="zaragoza" required data-rule="radio" class="h-4 w-4 border-zinc-600 bg-zinc-900 text-amber-400 focus:ring-amber-300/40">
								<span data-i18n="locationZGZ"></span>
							</label>
						</div>
						<p id="locationError" class="mt-1 hidden text-sm text-rose-300"></p>
					</fieldset>

					<div class="sm:col-span-2">
						<label for="shippingType" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelShippingType"></label>
						<select id="shippingType" name="shippingType" required data-rule="select" aria-describedby="shippingTypeError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30">
							<option value="" data-i18n="optionShippingDefault"></option>
							<option value="air" data-i18n="optionShippingAir"></option>
							<option value="land" data-i18n="optionShippingLand"></option>
							<option value="sea" data-i18n="optionShippingSea"></option>
						</select>
						<p id="shippingTypeError" class="mt-1 hidden text-sm text-rose-300"></p>
					</div>
				</div>
			</fieldset>

			<p id="registrationFormStatus" class="mt-4 hidden rounded-lg border px-3 py-2 text-sm" aria-live="polite"></p>

			<div class="mt-6 flex flex-col gap-3 sm:flex-row">
				<button type="submit" class="w-full rounded-xl bg-gradient-to-r from-amber-400 to-orange-500 px-6 py-3 text-sm font-semibold text-zinc-950 transition hover:from-amber-300 hover:to-orange-400 sm:w-auto" data-i18n="buttonSubmit"></button>
				<button type="reset" class="w-full rounded-xl border border-zinc-600 px-6 py-3 text-sm font-semibold text-zinc-100 transition hover:border-blue-400 hover:bg-zinc-800 sm:w-auto" data-i18n="buttonReset"></button>
			</div>
		</form>
	</main>

	<footer class="border-t border-zinc-800 bg-zinc-950/95">
		<div class="mx-auto flex max-w-5xl flex-col gap-3 px-4 py-8 text-sm text-zinc-400 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
			<p data-i18n="footerMain"></p>
			<p data-i18n="footerCopy"></p>
		</div>
	</footer>
</body>
</html>
