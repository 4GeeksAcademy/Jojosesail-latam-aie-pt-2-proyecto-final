<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackFlow | Logistica B2B y Gestion de Almacenes</title>
  <meta name="description" content="TrackFlow impulsa operaciones logisticas B2B entre Los Angeles y Zaragoza con almacenamiento, envios y devoluciones inteligentes.">
  <meta name="keywords" content="logistica B2B, gestion de almacenes, fulfillment, ultima milla, devoluciones, Los Angeles, Zaragoza">
  <meta name="author" content="TrackFlow Tech">
  <meta name="robots" content="index, follow">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="validation.js"></script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://trackflow.example/#organization",
      "name": "TrackFlow",
      "url": "https://trackflow.example",
      "logo": "https://trackflow.example/logo.png",
      "description": "Empresa de logistica de ultima milla y gestion de almacenes para marcas de e-commerce en Estados Unidos y Espana.",
      "email": "comercial@trackflow.example",
      "telephone": "+1-310-555-0147",
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "contactType": "sales",
          "email": "comercial@trackflow.example",
          "telephone": "+1-310-555-0147",
          "areaServed": ["US", "ES"],
          "availableLanguage": ["es", "en"]
        }
      ],
      "address": [
        {
          "@type": "PostalAddress",
          "addressLocality": "Los Angeles",
          "addressCountry": "US"
        },
        {
          "@type": "PostalAddress",
          "addressLocality": "Zaragoza",
          "addressCountry": "ES"
        }
      ],
      "areaServed": ["United States", "Spain"]
    }
  </script>
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100 antialiased">
  <div class="pointer-events-none absolute inset-0 -z-10 overflow-hidden" aria-hidden="true">
    <div class="absolute -left-20 top-0 h-72 w-72 rounded-full bg-amber-400/15 blur-3xl"></div>
    <div class="absolute right-0 top-20 h-80 w-80 rounded-full bg-orange-500/15 blur-3xl"></div>
    <div class="absolute left-1/2 top-1/3 h-72 w-72 -translate-x-1/2 rounded-full bg-blue-500/15 blur-3xl"></div>
  </div>

  <header class="border-b border-zinc-800/90 bg-zinc-950/95 backdrop-blur">
    <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between gap-3">
        <a href="index.html" class="inline-flex items-center gap-3" data-i18n-aria="brandAria">
          <img
            src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=120&q=80"
            alt="Vista exterior de centro logistico moderno con muelles de carga para operaciones B2B"
            class="h-10 w-10 rounded-xl object-cover ring-1 ring-orange-400/60"
          >
          <span class="text-base font-semibold tracking-wide text-amber-300 sm:text-lg">TrackFlow</span>
        </a>

        <div class="flex items-center gap-2">
          <button type="button" data-lang-toggle="es" class="rounded-md border border-zinc-700 px-2.5 py-1 text-xs font-semibold text-zinc-200 transition hover:border-amber-400 hover:text-amber-300">ES</button>
          <button type="button" data-lang-toggle="en" class="rounded-md border border-zinc-700 px-2.5 py-1 text-xs font-semibold text-zinc-200 transition hover:border-amber-400 hover:text-amber-300">EN</button>
        </div>
      </div>

      <nav aria-label="Navegacion principal" class="mt-3 flex w-full flex-col gap-2 sm:mt-4 sm:flex-row sm:items-center sm:justify-end sm:gap-3">
        <a href="#contacto" class="w-full rounded-lg px-3 py-2 text-center text-sm font-medium text-zinc-200 transition hover:bg-zinc-800 hover:text-white sm:w-auto" data-i18n="navContact"></a>
        <a href="application.html" class="w-full rounded-lg bg-gradient-to-r from-amber-400 to-orange-500 px-4 py-2 text-center text-sm font-semibold text-zinc-950 transition hover:from-amber-300 hover:to-orange-400 sm:w-auto" data-i18n="navRegister"></a>
      </nav>
    </div>
  </header>

  <main>
    <section class="mx-auto grid max-w-7xl gap-10 px-4 py-12 sm:px-6 sm:py-14 lg:grid-cols-2 lg:px-8 lg:py-20" aria-labelledby="hero-title">
      <div class="space-y-6">
        <p class="inline-flex rounded-full border border-orange-400/50 bg-orange-500/10 px-4 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-orange-200" data-i18n="heroTag"></p>
        <h1 id="hero-title" class="text-3xl font-bold leading-tight text-white sm:text-4xl lg:text-5xl" data-i18n="heroTitle"></h1>
        <p class="max-w-xl text-base leading-relaxed text-zinc-300 sm:text-lg" data-i18n="heroDesc"></p>
        <div class="flex flex-col gap-3 sm:flex-row sm:flex-wrap">
          <a href="application.html" class="w-full rounded-xl bg-blue-500 px-5 py-3 text-center text-sm font-semibold text-white transition hover:bg-blue-400 sm:w-auto" data-i18n="heroCtaPrimary"></a>
          <a href="#que-hacemos" class="w-full rounded-xl border border-zinc-600 px-5 py-3 text-center text-sm font-semibold text-zinc-100 transition hover:border-amber-400 hover:text-white sm:w-auto" data-i18n="heroCtaSecondary"></a>
        </div>
      </div>
      <figure class="min-h-64 overflow-hidden rounded-2xl border border-zinc-800 bg-zinc-900/70 shadow-2xl shadow-black/70 sm:min-h-80 lg:min-h-0">
        <img
          src="https://images.unsplash.com/photo-1553413077-190dd305871c?auto=format&fit=crop&w=1400&q=80"
          alt="Equipo de operaciones revisando inventario y salidas de pedidos dentro de almacen industrial"
          class="h-full w-full object-cover"
        >
      </figure>
    </section>

    <section id="que-hacemos" class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8 lg:py-14" aria-labelledby="que-hacemos-title">
      <div class="max-w-3xl space-y-4">
        <h2 id="que-hacemos-title" class="text-2xl font-bold text-white sm:text-3xl" data-i18n="whatTitle"></h2>
        <p class="text-zinc-300" data-i18n="whatDesc"></p>
      </div>
      <div class="mt-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <article class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-5">
          <h3 class="text-lg font-semibold text-amber-300" data-i18n="feature1Title"></h3>
          <p class="mt-2 text-sm text-zinc-300" data-i18n="feature1Desc"></p>
        </article>
        <article class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-5">
          <h3 class="text-lg font-semibold text-orange-300" data-i18n="feature2Title"></h3>
          <p class="mt-2 text-sm text-zinc-300" data-i18n="feature2Desc"></p>
        </article>
        <article class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-5">
          <h3 class="text-lg font-semibold text-blue-300" data-i18n="feature3Title"></h3>
          <p class="mt-2 text-sm text-zinc-300" data-i18n="feature3Desc"></p>
        </article>
      </div>
    </section>

    <section class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8 lg:py-14" aria-labelledby="beneficios-title">
      <h2 id="beneficios-title" class="text-2xl font-bold text-white sm:text-3xl" data-i18n="benefitsTitle"></h2>
      <div class="mt-8 grid gap-5 md:grid-cols-2 xl:grid-cols-4">
        <article class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-5">
          <p class="text-sm uppercase tracking-wider text-amber-300" data-i18n="benefit1Title"></p>
          <p class="mt-2 text-sm text-zinc-300" data-i18n="benefit1Desc"></p>
        </article>
        <article class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-5">
          <p class="text-sm uppercase tracking-wider text-orange-300" data-i18n="benefit2Title"></p>
          <p class="mt-2 text-sm text-zinc-300" data-i18n="benefit2Desc"></p>
        </article>
        <article class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-5">
          <p class="text-sm uppercase tracking-wider text-blue-300" data-i18n="benefit3Title"></p>
          <p class="mt-2 text-sm text-zinc-300" data-i18n="benefit3Desc"></p>
        </article>
        <article class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-5">
          <p class="text-sm uppercase tracking-wider text-rose-300" data-i18n="benefit4Title"></p>
          <p class="mt-2 text-sm text-zinc-300" data-i18n="benefit4Desc"></p>
        </article>
      </div>
    </section>

    <section id="contacto" class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8 lg:py-16" aria-labelledby="contacto-title">
      <div class="grid gap-8 lg:grid-cols-[1fr_1.2fr]">
        <article class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-6">
          <h2 id="contacto-title" class="text-2xl font-bold text-white" data-i18n="contactTitle"></h2>
          <p class="mt-3 text-sm text-zinc-300" data-i18n="contactDesc"></p>
          <ul class="mt-6 space-y-3 text-sm text-zinc-200" data-i18n-aria="contactAria">
            <li><strong class="text-amber-300" data-i18n="contactEmailLabel"></strong> comercial@trackflow.example</li>
            <li><strong class="text-orange-300" data-i18n="contactPhoneLabel"></strong> +1 (310) 555-0147</li>
            <li><strong class="text-blue-300" data-i18n="contactOfficeLabel"></strong> Los Angeles (US) y Zaragoza (ES)</li>
          </ul>
        </article>

        <form id="contactForm" data-validate-form novalidate class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-5 sm:p-6" aria-labelledby="contact-form-title">
          <h3 id="contact-form-title" class="text-xl font-semibold text-white" data-i18n="contactFormTitle"></h3>
          <fieldset class="mt-5 rounded-xl border border-zinc-800 p-4">
            <legend class="px-1 text-sm font-medium text-zinc-200" data-i18n="legendContactDetails"></legend>
            <div class="mt-3 grid gap-4 sm:grid-cols-2">
              <div class="sm:col-span-1">
                <label for="contactName" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelName"></label>
                <input id="contactName" name="name" type="text" required data-rule="name" aria-describedby="contactNameError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30" data-i18n-placeholder="placeholderName">
                <p id="contactNameError" class="mt-1 hidden text-sm text-rose-300"></p>
              </div>
              <div class="sm:col-span-1">
                <label for="contactPhone" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelPhone"></label>
                <input id="contactPhone" name="phone" type="tel" required data-rule="phone" aria-describedby="contactPhoneError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30" data-i18n-placeholder="placeholderPhone">
                <p id="contactPhoneError" class="mt-1 hidden text-sm text-rose-300"></p>
              </div>
              <div class="sm:col-span-2">
                <label for="contactEmail" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelEmail"></label>
                <input id="contactEmail" name="email" type="email" required data-rule="email" aria-describedby="contactEmailError" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30" data-i18n-placeholder="placeholderEmail">
                <p id="contactEmailError" class="mt-1 hidden text-sm text-rose-300"></p>
              </div>
            </div>
          </fieldset>

          <fieldset class="mt-4 rounded-xl border border-zinc-800 p-4">
            <legend class="px-1 text-sm font-medium text-zinc-200" data-i18n="legendRequestDetails"></legend>
            <div class="mt-3 grid gap-4">
              <div>
                <label for="contactMessage" class="mb-1 block text-sm font-medium text-zinc-200" data-i18n="labelMessage"></label>
                <textarea id="contactMessage" name="message" required minlength="10" data-rule="message" aria-describedby="contactMessageError" rows="4" class="w-full rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 outline-none transition placeholder:text-zinc-500 focus:border-amber-400 focus:ring-2 focus:ring-amber-300/30 data-[invalid=true]:border-rose-500 data-[invalid=true]:ring-2 data-[invalid=true]:ring-rose-300/30" data-i18n-placeholder="placeholderMessage"></textarea>
                <p id="contactMessageError" class="mt-1 hidden text-sm text-rose-300"></p>
              </div>
            </div>
          </fieldset>
          <p id="contactFormStatus" class="mt-4 hidden rounded-lg border px-3 py-2 text-sm" aria-live="polite"></p>
          <div class="mt-6 flex flex-col gap-3 sm:flex-row sm:flex-wrap">
            <button type="submit" class="w-full rounded-xl bg-gradient-to-r from-amber-400 to-orange-500 px-5 py-3 text-sm font-semibold text-zinc-950 transition hover:from-amber-300 hover:to-orange-400 sm:w-auto" data-i18n="buttonSubmitRequest"></button>
            <button type="reset" class="w-full rounded-xl border border-zinc-600 px-5 py-3 text-sm font-semibold text-zinc-100 transition hover:border-blue-400 hover:bg-zinc-800 sm:w-auto" data-i18n="buttonReset"></button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="border-t border-zinc-800 bg-zinc-950/95">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-8 text-sm text-zinc-400 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
      <p data-i18n="footerMain"></p>
      <p data-i18n="footerCopy"></p>
    </div>
  </footer>
</body>
</html>
